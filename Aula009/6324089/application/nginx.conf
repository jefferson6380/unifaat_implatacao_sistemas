events {}
http {
    include /etc/nginx/mime.types;
    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
        location /api/ {
            proxy_pass http://app:3000;
        }
        location /health {
            proxy_pass http://app:3000/health;
        }
    }
}