services:
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - PORT=5000
      - DB_PATH=/data/portfolio.db
    volumes:
      - db_data:/data
      - ./frontend:/app/frontend
    restart: unless-stopped

volumes:
  db_data:
