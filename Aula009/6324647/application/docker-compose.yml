services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - PORT=3000
      - DB_PATH=/data/portfolio.db
    volumes:
      - db-data:/data
    expose:
      - "3000"

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  db-data:
