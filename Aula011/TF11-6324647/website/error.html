<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Página não encontrada | Gabriel Santiago</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-code { font-size: 8rem; font-weight: 700; color: var(--accent); line-height: 1; }
    .error-page h1 { margin: 1rem 0 0.5rem; }
    .error-page p { color: var(--muted); margin-bottom: 2rem; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code" aria-hidden="true">404</div>
    <h1>Página não encontrada</h1>
    <p>O conteúdo que você procura não existe ou foi movido.</p>
    <a href="index.html" class="btn btn-primary">← Voltar ao início</a>
  </div>
</body>
</html>
