version: '3.8'

services:
  backend:
    build: ./backend
    container_name: portfolio-api
    restart: unless-stopped
    ports:
      - "4000:3000"
    environment:
      - PORT=3000
      - DB_PATH=/app/data/portfolio.db
    volumes:
      - db-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: portfolio-frontend
    restart: unless-stopped
    ports:
      - "9000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  db-data:
