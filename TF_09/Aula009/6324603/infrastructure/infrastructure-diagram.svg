<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#0f172a"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#38bdf8" font-size="18" font-family="monospace" font-weight="bold">TF09 - Arquitetura AWS | Allison Henrique | RA: 6324603</text>

  <!-- Internet -->
  <rect x="320" y="55" width="160" height="45" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="2"/>
  <text x="400" y="73" text-anchor="middle" fill="#38bdf8" font-size="13" font-family="monospace" font-weight="bold">🌐 INTERNET</text>
  <text x="400" y="91" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="monospace">0.0.0.0/0</text>

  <!-- Arrow Internet to IGW -->
  <line x1="400" y1="100" x2="400" y2="130" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Internet Gateway -->
  <rect x="300" y="130" width="200" height="45" rx="8" fill="#1e3a5f" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="148" text-anchor="middle" fill="#f59e0b" font-size="13" font-family="monospace" font-weight="bold">🔀 Internet Gateway</text>
  <text x="400" y="166" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="monospace">igw-portfolio-tf09</text>

  <!-- Arrow IGW to VPC -->
  <line x1="400" y1="175" x2="400" y2="205" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- VPC Box -->
  <rect x="40" y="205" width="720" height="360" rx="12" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="60" y="228" fill="#64748b" font-size="12" font-family="monospace">VPC: 10.0.0.0/16 | us-east-1</text>

  <!-- Public Subnet -->
  <rect x="60" y="240" width="320" height="300" rx="10" fill="#0f2744" stroke="#22c55e" stroke-width="2"/>
  <text x="220" y="262" text-anchor="middle" fill="#22c55e" font-size="12" font-family="monospace" font-weight="bold">📡 Public Subnet</text>
  <text x="220" y="278" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="monospace">10.0.1.0/24 | us-east-1a</text>

  <!-- Route Table Public -->
  <rect x="80" y="290" width="280" height="55" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="220" y="308" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="monospace" font-weight="bold">Route Table (Pública)</text>
  <text x="220" y="324" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">0.0.0.0/0 → IGW</text>
  <text x="220" y="338" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">10.0.0.0/16 → local</text>

  <!-- EC2 Box -->
  <rect x="80" y="360" width="280" height="155" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="220" y="382" text-anchor="middle" fill="#f59e0b" font-size="13" font-family="monospace" font-weight="bold">🖥️ EC2 t3.micro</text>
  <text x="220" y="398" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="monospace">Amazon Linux 2</text>

  <!-- SG Web -->
  <rect x="95" y="410" width="250" height="90" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="220" y="428" text-anchor="middle" fill="#ef4444" font-size="11" font-family="monospace" font-weight="bold">🔒 SG: sg-webserver</text>
  <text x="220" y="444" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">IN: 22 ← SEU_IP/32 (SSH)</text>
  <text x="220" y="458" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">IN: 80, 443 ← 0.0.0.0/0</text>
  <text x="220" y="472" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">IN: 3000 ← 0.0.0.0/0 (API)</text>
  <text x="220" y="486" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">OUT: All → 0.0.0.0/0</text>

  <!-- Docker label -->
  <text x="220" y="505" text-anchor="middle" fill="#7dd3fc" font-size="11" font-family="monospace">🐳 Docker: Nginx + Node.js + SQLite</text>

  <!-- Private Subnet -->
  <rect x="420" y="240" width="320" height="300" rx="10" fill="#1a0f2e" stroke="#a855f7" stroke-width="2"/>
  <text x="580" y="262" text-anchor="middle" fill="#a855f7" font-size="12" font-family="monospace" font-weight="bold">🔒 Private Subnet</text>
  <text x="580" y="278" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="monospace">10.0.2.0/24 | us-east-1b</text>

  <!-- Route Table Private -->
  <rect x="440" y="290" width="280" height="55" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="580" y="308" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="monospace" font-weight="bold">Route Table (Privada)</text>
  <text x="580" y="324" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">10.0.0.0/16 → local</text>
  <text x="580" y="338" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">sem rota para internet</text>

  <!-- DB Box -->
  <rect x="440" y="360" width="280" height="155" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <text x="580" y="382" text-anchor="middle" fill="#a855f7" font-size="13" font-family="monospace" font-weight="bold">🗄️ Database</text>
  <text x="580" y="398" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="monospace">SQLite (expansível p/ RDS)</text>

  <!-- SG DB -->
  <rect x="455" y="410" width="250" height="75" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="580" y="428" text-anchor="middle" fill="#ef4444" font-size="11" font-family="monospace" font-weight="bold">🔒 SG: sg-database</text>
  <text x="580" y="444" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">IN: 5432 ← sg-webserver</text>
  <text x="580" y="458" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">OUT: All → 10.0.0.0/16</text>
  <text x="580" y="472" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">sem acesso externo</text>

  <!-- Arrow EC2 to DB -->
  <line x1="360" y1="437" x2="440" y2="437" stroke="#a855f7" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow2)"/>
  <text x="400" y="430" text-anchor="middle" fill="#a855f7" font-size="10" font-family="monospace">5432</text>

  <!-- Key Pair note -->
  <rect x="60" y="510" width="200" height="30" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="160" y="530" text-anchor="middle" fill="#f59e0b" font-size="11" font-family="monospace">🔑 Key Pair: portfolio-key.pem</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
  </defs>
</svg>
